services:
  monitor-api:
    build: .
    container_name: monitor-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./data:/app/data
